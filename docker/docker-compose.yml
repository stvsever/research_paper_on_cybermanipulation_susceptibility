services:
  cognitive-sovereignty-sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-deepseek/deepseek-v4-flash}"
      OUTPUT_ROOT: "${OUTPUT_ROOT:-evaluation/tests/run_1}"
      RUN_ID: "${RUN_ID:-run_1}"
      N_PROFILES: "${N_PROFILES:-60}"
      PIPELINE_SEED: "${PIPELINE_SEED:-120}"
      ATTACK_RATIO: "${ATTACK_RATIO:-1.0}"
      ATTACK_LEAVES: "${ATTACK_LEAVES:-Headline_And_Lede_Misframing,Personal_Safety_Fear_Appeal,Petition_Astroturf,Multi_Turn_Counter_Argument_Adaptation}"
      OPINION_LEAVES: "${OPINION_LEAVES:-Alliance_Commitment_Support,Trust_In_Mainstream_Journalism,Defense_Spending_Increase_Support}"
      PROFILE_CANDIDATE_MULTIPLIER: "${PROFILE_CANDIDATE_MULTIPLIER:-8}"
      TEMPERATURE: "${TEMPERATURE:-0.15}"
      MAX_REPAIR_ITER: "${MAX_REPAIR_ITER:-2}"
      BOOTSTRAP_SAMPLES: "${BOOTSTRAP_SAMPLES:-600}"
      REPORT_ROOT: "${REPORT_ROOT:-research_report/report}"
      REPORT_ASSETS_ROOT: "${REPORT_ASSETS_ROOT:-research_report/assets}"
      PAPER_TITLE: "${PAPER_TITLE:-Inter-individual Differences in Susceptibility to Cyber-manipulation of Political Opinions: An Ontology-Constrained Multi-Agent Simulation Approach}"
      BUILD_REPORT: "${BUILD_REPORT:-false}"
      RUN_STAGE_CHECKS: "${RUN_STAGE_CHECKS:-true}"
      # Custom ontology paths (optional — overrides built-in test ontologies)
      PROFILE_ONTOLOGY_PATH: "${PROFILE_ONTOLOGY_PATH:-}"
      ATTACK_ONTOLOGY_PATH: "${ATTACK_ONTOLOGY_PATH:-}"
      OPINION_ONTOLOGY_PATH: "${OPINION_ONTOLOGY_PATH:-}"
    volumes:
      - ../evaluation:/app/evaluation
      - ../research_report:/app/research_report
